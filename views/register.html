<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Register</h1>
      <br>
<br>
      <form class="auth-form" action="/register" method="POST">
        <div class="auth-field">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" required>
        </div>

<br>
        <div class="auth-field password-field">
  <label for="password">Password</label>

  <div class="password-input-wrap">
    <input id="password" type="password" name="password" required
    oninput="checkPasswordStrength()">

    <button
      type="button"
      class="toggle-password-btn"
      onclick="togglePassword('password', this)"
    >
      👁️
    </button>
  </div>
</div>

<div id="passwordRules" class="password-rules">
  <div id="ruleLength">❌ At least 8 characters</div>
  <div id="ruleNumber">❌ Contains a number</div>
  <div id="ruleUpper">❌ Contains an uppercase letter</div>
  <div id="ruleLower">❌ Contains a lowercase letter</div>
</div>
 <br>

        <button class="auth-submit" type="submit">Create Account</button>
      </form>
 <br>

      <div class="auth-footer">
        Already have an account? <a href="/login">Login</a>
      </div>
    </div>
  </div>
  <script>
  function togglePassword(id, btn) {
    const input = document.getElementById(id);

    if (!input) return;

    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }
</script>
<script>
  function checkPasswordStrength() {
    const value = document.getElementById('password').value;

    const hasLength = value.length >= 8;
    const hasNumber = /\d/.test(value);
    const hasUpper = /[A-Z]/.test(value);
    const hasLower = /[a-z]/.test(value);

    document.getElementById('ruleLength').textContent =
      (hasLength ? '✅' : '❌') + ' At least 8 characters';

    document.getElementById('ruleNumber').textContent =
      (hasNumber ? '✅' : '❌') + ' Contains a number';

    document.getElementById('ruleUpper').textContent =
      (hasUpper ? '✅' : '❌') + ' Contains an uppercase letter';

    document.getElementById('ruleLower').textContent =
      (hasLower ? '✅' : '❌') + ' Contains a lowercase letter';
  }
</script>
</body>
</html>
